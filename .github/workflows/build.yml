name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
            name: macos-arm64
          - os: linux
            arch: amd64
            name: linux-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build ${{ matrix.name }}
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
            go build -o bustrip-${{ matrix.name }} .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bustrip-${{ matrix.name }}
          path: bustrip-${{ matrix.name }}
